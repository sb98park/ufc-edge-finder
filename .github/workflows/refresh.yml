name: Refresh UFC Edge Finder

on:
  schedule:
    # Every 5 minutes -- GitHub Actions' minimum cron interval. Honest
    # expectation-setting: scheduled triggers are best-effort and lag
    # 5-20 min under load (especially at the top of the hour), so this
    # buys a faster AVERAGE cadence, not a guaranteed 5-minute tick.
    # The manual "Run workflow" button (workflow_dispatch) remains the
    # guaranteed on-demand refresh, including from the GitHub mobile app.
    # Note the front-end already updates displayed prices in real time
    # client-side (data-live-token); this job's cadence governs model
    # recalcs, result detection, movement tags, and charts.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

# At 5-minute spacing, schedule jitter can bunch two runs together --
# without this, both would generate, both would commit, and one push
# would be rejected (exactly the fetch-first race a manual push hits
# when the remote moves underneath it). Serialize: one run at a time,
# at most one queued behind it; further triggers collapse into the
# queued one, which is the correct behavior for a refresh job (running
# three stale queued refreshes back-to-back would add nothing).
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate site
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python generate_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # .gitattributes points docs/* and data/* at a custom "ours"
          # merge driver, but git doesn't ship one under that name --
          # it has to be registered locally before git will honor it.
          # Each Actions run gets a fresh, empty checkout with no config
          # carried over from previous runs, so without this line every
          # run silently falls back to a real content-level merge on
          # these files and fails with a genuine conflict the moment
          # the remote has moved (a manual push, or a prior queued run).
          git config merge.ours.driver true
          # Directory-scoped, not an explicit file list -- an explicit
          # list silently misses any new output file a future change
          # adds (this is exactly what broke: data/future_cards.csv and
          # data/fighters.csv were both being written by the pipeline
          # but weren't in the old list, which left them uncommitted and
          # made every subsequent `git pull --rebase` below fail against
          # a dirty working tree, halting the job before it ever reached
          # `git push`). Scoped to docs/ and data/ specifically rather
          # than `git add -A` at the repo root, so it can never
          # accidentally stage something outside the pipeline's own
          # output (source changes, workflow edits, etc.).
          git add -A -- docs/ data/
          git diff --staged --quiet || git commit -m "Auto-refresh site [skip ci]"
          # Rebase onto whatever landed on the remote while this run was
          # working (a manual push, or a run that slipped past the
          # concurrency queue) instead of failing on a non-fast-forward.
          git pull --rebase origin main
          git push
