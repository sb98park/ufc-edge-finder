name: Refresh UFC Edge Finder

on:
  schedule:
    # Every 15 minutes, all the time -- not just during the Saturday
    # fight-night window. Widened from a 4-hour baseline + narrow boost
    # window so results, odds, and line movement get picked up quickly
    # regardless of when they actually happen (early weigh-in news,
    # a result posted late, odds moving on a weekday, etc.), not just
    # during a specific anticipated card.
    # Note: Actions schedules can lag 5-20 min under load; the manual
    # "Run workflow" button (workflow_dispatch) is the guaranteed
    # on-demand refresh, including from the GitHub mobile app.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate site
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python generate_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/odds_snapshot.json data/predictions_log.csv data/clob_token_cache.json data/fight_results.csv data/schedule_state.json data/accuracy_history.csv
          git diff --staged --quiet || git commit -m "Auto-refresh site [skip ci]"
          git push
