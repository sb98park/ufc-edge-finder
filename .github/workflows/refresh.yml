name: Refresh UFC Edge Finder

on:
  schedule:
    # Every 5 minutes -- GitHub Actions' minimum cron interval. Honest
    # expectation-setting: scheduled triggers are best-effort and lag
    # 5-20 min under load (especially at the top of the hour), so this
    # buys a faster AVERAGE cadence, not a guaranteed 5-minute tick.
    # The manual "Run workflow" button (workflow_dispatch) remains the
    # guaranteed on-demand refresh, including from the GitHub mobile app.
    # Note the front-end already updates displayed prices in real time
    # client-side (data-live-token); this job's cadence governs model
    # recalcs, result detection, movement tags, and charts.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

# At 5-minute spacing, schedule jitter can bunch two runs together --
# without this, both would generate, both would commit, and one push
# would be rejected (exactly the fetch-first race a manual push hits
# when the remote moves underneath it). Serialize: one run at a time,
# at most one queued behind it; further triggers collapse into the
# queued one, which is the correct behavior for a refresh job (running
# three stale queued refreshes back-to-back would add nothing).
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate site
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python generate_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/odds_snapshot.json data/predictions_log.csv data/clob_token_cache.json data/fight_results.csv data/schedule_state.json data/accuracy_history.csv
          git diff --staged --quiet || git commit -m "Auto-refresh site [skip ci]"
          # Rebase onto whatever landed on the remote while this run was
          # working (a manual push, or a run that slipped past the
          # concurrency queue) instead of failing on a non-fast-forward.
          git pull --rebase origin main
          git push
