name: Refresh UFC Edge Finder

on:
  schedule:
    # Every 4 hours (baseline)
    - cron: "0 */4 * * *"
    # Fight-night boost: every 15 min through the typical Saturday card
    # window -- 5pm ET Sat through 1am ET Sun (EDT = UTC-4). GitHub cron
    # runs on UTC, so that's Sat 21:00-23:59 UTC + Sun 00:00-05:00 UTC.
    # Note: Actions schedules can lag 5-20 min under load; the manual
    # "Run workflow" button (workflow_dispatch) is the guaranteed
    # on-demand refresh, including from the GitHub mobile app.
    - cron: "*/15 21-23 * * 6"
    - cron: "*/15 0-5 * * 0"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate site
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python generate_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/odds_snapshot.json data/predictions_log.csv data/clob_token_cache.json data/fight_results.csv data/schedule_state.json data/accuracy_history.csv
          git diff --staged --quiet || git commit -m "Auto-refresh site [skip ci]"
          git push
